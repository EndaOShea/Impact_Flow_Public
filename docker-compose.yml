services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: impact-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-impactflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_this}
      POSTGRES_DB: ${POSTGRES_DB:-impactflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-impactflow_user} -d ${POSTGRES_DB:-impactflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impact-flow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-2001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-impactflow_user}:${POSTGRES_PASSWORD:-secure_password_change_this}@postgres:5432/${POSTGRES_DB:-impactflow_db}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-random-32-char-string}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-change-this-to-another-random-string}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:2080}
      SESSION_DURATION_HOURS: ${SESSION_DURATION_HOURS:-24}
      SESSION_CLEANUP_INTERVAL_MINUTES: ${SESSION_CLEANUP_INTERVAL_MINUTES:-60}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    ports:
      - "2001:2001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: impact-flow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-http://localhost:2001/api}
    ports:
      - "2080:2080"

volumes:
  postgres_data:
    name: impact-flow-postgres-data

networks:
  default:
    name: impact-flow-network
