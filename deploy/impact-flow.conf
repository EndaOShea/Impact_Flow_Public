# Host nginx vhost for Impact Flow  --  the "isteach pattern" edge proxy
#
# Install on the VPS (srv881581, 31.97.45.160):
#   sudo cp deploy/impact-flow.conf /etc/nginx/sites-available/impact-flow.conf
#   sudo ln -s /etc/nginx/sites-available/impact-flow.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d impact-flow.cora-branch.com
#
# certbot rewrites the :80 block to redirect to :443 and fills in the ssl_* lines
# below the first time it runs. The in-stack nginx container is bound to
# 127.0.0.1:8081 and owns ALL content headers (CSP, X-Frame-Options,
# X-Content-Type-Options, Referrer-Policy) plus the /api/ routing -- this edge
# proxy only terminates TLS and owns HSTS. One owner per header.

server {
    listen 80;
    server_name impact-flow.cora-branch.com;
    location / { return 301 https://$host$request_uri; }   # certbot manages the ACME path
}

server {
    listen 443 ssl http2;
    server_name impact-flow.cora-branch.com;

    ssl_certificate     /etc/letsencrypt/live/impact-flow.cora-branch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impact-flow.cora-branch.com/privkey.pem;

    # Edge owns HSTS ONLY. The container sets CSP / X-Frame-Options /
    # X-Content-Type-Options / Referrer-Policy and they pass through untouched --
    # do NOT re-add them here or you get duplicate/conflicting headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Attachments are data-URI/base64 in JSON; allow a comfortable request body.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8081;          # the in-stack nginx container
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
