services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: impact-flow-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: impactflow_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: impactflow_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impactflow_user -d impactflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (with hot-reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: impact-flow-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 2001
      DATABASE_URL: postgresql://impactflow_user:dev_password@postgres:5432/impactflow_db
      SESSION_SECRET: dev-secret-key-not-for-production
      API_KEY_ENCRYPTION_SECRET: dev-encryption-secret-not-for-production
      FRONTEND_URL: http://localhost:2080
      SESSION_DURATION_HOURS: 24
      SESSION_CLEANUP_INTERVAL_MINUTES: 60
      RATE_LIMIT_WINDOW_MINUTES: 15
      RATE_LIMIT_MAX_REQUESTS: 100
    volumes:
      # Mount source for hot-reload
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      # Prevent node_modules from being overwritten
      - /app/node_modules
    ports:
      - "2001:2001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (with hot-reload)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: impact-flow-frontend-dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:2001/api
    volumes:
      # Mount source code for hot reloading
      - ./components:/app/components
      - ./services:/app/services
      - ./types.ts:/app/types.ts
      - ./App.tsx:/app/App.tsx
      - ./index.tsx:/app/index.tsx
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      # Prevent node_modules from being overwritten
      - /app/node_modules
    ports:
      - "2080:2080"

volumes:
  postgres_data_dev:
    name: impact-flow-postgres-data-dev

networks:
  default:
    name: impact-flow-network-dev
