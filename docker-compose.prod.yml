# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database (Internal only - no external ports)
  postgres:
    image: postgres:14-alpine
    container_name: impact-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-impactflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    # Database NOT exposed to host - only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-impactflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  # Backend API (Exposed temporarily - remove when nginx is ready)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impact-flow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 2001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-impactflow_db}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required - generate with openssl rand -base64 48}
      FRONTEND_URL: ${FRONTEND_URL:-https://impact-flow.cora-branch.com}
      SESSION_DURATION_HOURS: ${SESSION_DURATION_HOURS:-24}
      SESSION_CLEANUP_INTERVAL_MINUTES: ${SESSION_CLEANUP_INTERVAL_MINUTES:-60}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    # NOT published to the host - reached internally as http://backend:2001 (via nginx)
    expose:
      - "2001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend-network

  # Frontend (Exposed temporarily - remove when nginx is ready)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://impact-flow.cora-branch.com/api}
    container_name: impact-flow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # NOT published to the host - reached internally as http://frontend:2080 (via nginx)
    expose:
      - "2080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend-network

  # NGINX Reverse Proxy (Only service exposed to host)
  nginx:
    image: nginx:alpine
    container_name: impact-flow-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      # localhost ONLY - the host reverse proxy (host nginx) terminates TLS and proxies here.
      # TLS is owned by the host proxy, not this container; no public 443 binding.
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: impact-flow-postgres-data

networks:
  backend-network:
    name: impact-flow-network
    driver: bridge
