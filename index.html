<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impact Flow Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "hash-wasm": "https://cdn.jsdelivr.net/npm/hash-wasm@4.11.0/dist/index.esm.js"
  }
}
</script>
<style>
  /* Global Scrollbar Customization */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  /* Default Thumb (Light Grey for White Backgrounds) */
  ::-webkit-scrollbar-thumb {
    background-color: #cbd5e1; /* slate-300 */
    border-radius: 6px;
    border: 3px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: #94a3b8; /* slate-400 */
  }

  /* Specific Styling for Dark Backgrounds (Sidebar) */
  .bg-slate-900 ::-webkit-scrollbar-thumb,
  .bg-slate-950 ::-webkit-scrollbar-thumb,
  aside ::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
  }

  .bg-slate-900 ::-webkit-scrollbar-thumb:hover,
  .bg-slate-950 ::-webkit-scrollbar-thumb:hover,
  aside ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 255, 255, 0.4);
  }
</style>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script>
      // Initialize mermaid explicitly to avoid auto-start conflicts with React
      document.addEventListener('DOMContentLoaded', function () {
        if (window.mermaid) {
          mermaid.initialize({ startOnLoad: false, theme: 'default' });
        }
      });
    </script>
  </body>
</html>
